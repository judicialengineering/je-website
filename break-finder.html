function ScoreGauge({score}) {
 const color = score>=70?JE.pink:score>=45?"#FF9800":JE.yellow;
 const label = score>=70?"CRITICAL":score>=45?"ELEVATED":"MONITORED";
 const r=54,cx=64,cy=64,circ=2*Math.PI*r,dash=(score/100)*circ;
 return (
 <div style={{textAlign:"center"}}>
 <svg width={128} height={128} viewBox="0 0 128 128">
 <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1C1C1E" strokeWidth={10}/>
 <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={10}
 strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
 transform="rotate(-90 64 64)" style={{transition:"stroke-dasharray 1.2s ease"}}/>
 <text x={cx} y={cy-6} textAnchor="middle" fill={color}
 style={{fontFamily:"'Courier New',monospace",fontSize:22,fontWeight:700}}>{score}</text>
 <text x={cx} y={cy+14} textAnchor="middle" fill="#B0B0B0"
 style={{fontFamily:"'Courier New',monospace",fontSize:9,letterSpacing:2}}>BREAK SCORE</text>
 </svg>
 <div style={{color,fontFamily:"'Courier New',monospace",fontSize:"0.75rem",letterSpacing:"0.2em",marginTop:-8}}>{label}</div>
 </div>
 );
}

function App() {

 const [pasteData,setPasteData] = React.useState("");
 const [companyName,setCompanyName] = React.useState("");
 const [monthPeriod,setMonthPeriod] = React.useState("");
 const [scorecardScore,setScorecardScore] = React.useState("");
 const [captureEmail,setCaptureEmail] = React.useState("");
 const [captureName,setCaptureName] = React.useState("");
 const [captureError,setCaptureError] = React.useState("");
 const [analysis,setAnalysis] = React.useState(null);
 const [error,setError] = React.useState("");
 const [progress,setProgress] = React.useState(0);
 const [emailSent,setEmailSent] = React.useState(false);

 const handleRunAnalysis = async () => {
 if(!captureEmail.trim()||!captureEmail.includes("@")){setCaptureError("Please enter a valid email address.");return;}
 if(!captureName.trim()){setCaptureError("Please enter your name.");return;}
 setCaptureError("");
 setStage("analyzing");
 setProgress(0);

 const ticker = setInterval(()=>setProgress(p=>p>=90?90:p+Math.random()*12),400);

 const systemPrompt = `You are the AI engine inside the 3PL Diagnostic Suite by Judicial Engineering, founded by Rebecca Thompson with the tagline "I Trace It Back." Analyze accessorial charge data and return ONLY valid JSON with no markdown, no backticks and no preamble.

Return this exact structure:
{
 "breakScore": <integer 0-100>,
 "severity": "<critical|elevated|monitored>",
 "summary": "<2-3 sentence consultant-voice narrative>",
 "totalExposure": "<formatted dollar string>",
 "topPattern": "<single most important pattern>",
 "breaks": [
 {
 "rank": 1,
 "title": "<short break name>",
 "severity": "<critical|high|moderate>",
 "amount": "<dollar exposure or null>",
 "finding": "<2-3 sentences - be concrete about clients, lanes and dollars>",
 "action": "<specific actionable recommendation>",
 "escalate": true
 }
 ],
 "escalationReason": "<ALWAYS provide - 1-2 sentences why Judicial Engineering should be involved>",
 "nextLayerPrompt": "<one sentence on what monthly subscription catches automatically>"
}

Rules: escalationReason is ALWAYS populated. escalate true on highest severity breaks. breakScore 70 and above is critical, 45 to 69 is elevated, under 45 is monitored. Sound like a seasoned freight ops consultant - direct and evidence-based.`;

 const userPrompt = `Company: ${companyName||"Unnamed 3PL"}
Period: ${monthPeriod||"Not specified"}
Submitted by: ${captureName} (${captureEmail})
${scorecardScore?`Layer 1 Score: ${scorecardScore}`:""}

CHARGE DATA:
${pasteData}`;

 try {
 const res = await fetch("/api/analyze",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
 model:"claude-sonnet-4-20250514",
 max_tokens:1000,
 system:systemPrompt,
 messages:[{role:"user",content:userPrompt}],
 }),
 });

 clearInterval(ticker);
 setProgress(100);

 const data = await res.json();
 const raw = data.content?.find(b=>b.type==="text")?.text||"";
 const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
 setAnalysis(parsed);

 await sendEmails({
 toEmail:captureEmail,
 toName:captureName,
 companyName,
 period:monthPeriod,
 score:parsed.breakScore,
 severity:parsed.severity,
 summary:parsed.summary,
 topPattern:parsed.topPattern,
 breaks:parsed.breaks,
 escalationReason:parsed.escalationReason,
 totalExposure:parsed.totalExposure,
 });

 setEmailSent(true);
 setTimeout(()=>setStage("results"),400);
 } catch(err){
 clearInterval(ticker);
 console.error("Analysis error:",err);
 setError("Analysis failed. Please check your data and try again.");
 setStage("input");
 }
 };

 if(stage==="terms") return <TermsGate onAccept={()=>setStage("input")}/>;

 if(stage==="analyzing") {
 return (
 <div style={{minHeight:"calc(100vh - 68px)",background:JE.dark,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace",padding:"2rem"}}>
 <div style={{maxWidth:480,width:"100%",textAlign:"center"}}>
 <div style={{color:JE.pink,fontSize:"0.65rem",letterSpacing:"0.25em",marginBottom:"2.5rem",animation:"blink 1.4s infinite",textTransform:"uppercase"}}>
 Judicial Engineering · AI Break Finder · Running
 </div>

 </div>
 {[[10,"Parsing charge data..."],[30,"Identifying charge type patterns..."],[50,"Cross-referencing client and lane exposure..."],[68,"Scoring break severity..."],[82,"Generating escalation package..."],[92,"Sending your report..."]].map(([t,label])=>(

 {progress>=t?"✓":"○"} {label}
 </div>
 ))}
 <div style={{color:JE.dim,fontSize:"0.65rem",marginTop:"2rem",letterSpacing:"0.1em",textTransform:"uppercase"}}>I Trace It Back.</div>
 </div>
 </div>
 );
 }

 if(stage==="capture") {
 return (
 <div style={{minHeight:"calc(100vh - 68px)",background:JE.dark,display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
 <div style={{maxWidth:480,width:"100%"}}>
 <div style={{textAlign:"center",marginBottom:"2rem"}}>
 <div style={{display:"inline-flex",alignItems:"center",gap:"0.5rem",marginBottom:"1.25rem"}}>
 <PulseRing color={JE.green}/>
 <span style={{color:JE.green,fontFamily:"'Courier New',monospace",fontSize:"0.65rem",letterSpacing:"0.18em",textTransform:"uppercase"}}>Data Received - Ready to Analyze</span>
